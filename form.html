<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<br><fieldset
    <form action="" method="post">
       <b><label for="name">Name</label></b>
        <input type="text" name="name" id="name"  /> <br><br>
       <b><label for="rollNo">Roll No</label></b>
        <input type="number" name="rollNo" id="rollNo"  /> <br><br>
       <b><label for="address">Address</label></b>
        <textarea name="address" id="address"></textarea> <br><br>
        <b><label for="email">Email</label></b>
        <input type="email" name="email" id="email"  /> <br><br>
        <b><label for="dob">Date of Birth</label></b>
        <input type="date" name="dob" id="dob"  /> <br><br>
         <b><label for="time">Time</label></b>
        <input type="time" name="time" id="time" /> <br><br>
        <b><label>Gender</label></b>
        <label><input type="radio" name="gender" value="male"  /> Male</label>
        <label><input type="radio" name="gender" value="female" /> Female</label>
        <label><input type="radio" name="gender" value="other" /> Other</label> <br><br>
        <b><label for="color">Favorite Color</label></b>
        <input type="text" name="color" id="color"  /> <br><br>
        <b><label for="image">Select your image</label></b>
        <input type="text" name="selectedImage" id="selectedImage"  /> <br><br>
        <b><label for="course">Course</label></b>
        <select name="course" id="course" >
            <option value="">Select course</option>
            <option value="Non-Medical">Non-Medical</option>
            <option value="Medical">Medical</option>
            <option value="Super-Medical">Super-Medical</option>
            <option value="commerce">Commerce</option>
            <option value="arts">Arts</option>
        </select> <br><br>
        <button type="submit">Submit</button>
        <button type="Reset">Reset</button>
        <button type="Back">Back</button>
    </form>     
</body>
</html>
