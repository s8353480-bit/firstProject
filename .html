<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RELATION</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        header {
            background: #111;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: #00c3ff;
        }

        .hero {
            height: 90vh;
            background: linear-gradient(to right, #00c3ff, #0072ff);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }

        .hero h2 {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            background: white;
            color: #0072ff;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .hero button:hover {
            background: #111;
            color: white;
        }

        .services {
            padding: 60px 20px;
            text-align: center;
        }

        .services h2 {
            margin-bottom: 40px;
            font-size: 32px;
        }

        .cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 280px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card h3 {
            margin-bottom: 15px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }

        @media(max-width: 768px){
            .hero h2 {
                font-size: 32px;
            }

            .cards {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>MyWebsite</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>BROTHER AND SISTER</h2>
    <p>Santy and Ritika is the best brother and sister in the world.</p>
    <button>Get Started</button>
</section>

<section class="services">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">
            <h3>BROTHER</h3>
            <p>Nishant kumar.</p>
        </div>

        <div class="card">
            <h3>SISTER</h3>
            <p>ritika.</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 MyWebsite | All Rights Reserved</p>
</footer>

</body>
</html>
