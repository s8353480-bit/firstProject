<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nishant Kumar - Personal Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: #333;
            text-align: center;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        img {
            width: 200px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 5px solid #4e73df;
        }

        h1 {
            margin: 10px 0;
            color: #4e73df;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background: #1cc88a;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #17a673;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="nishant.jpg" alt="Nishant Kumar">
        <h1>Nishant Kumar</h1>
        <p>Hello! Welcome to my personal website.<br>
        I am Nishant Kumar. Thank you for visiting my page.</p>

        <a href="#" class="btn">Contact Me</a>

        <footer>
            © 2026 Nishant Kumar | All Rights Reserved
        </footer>
    </div>

</body>
</html>
